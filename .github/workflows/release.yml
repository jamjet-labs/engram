name: Release

# Triggers on annotated/lightweight tags matching v0.1.0, v1.2.3, v0.1.0-rc1, etc.
# Push the tag from a clean main: `git tag -a v0.1.0 -m "..." && git push origin v0.1.0`.
#
# Setup (one-time, on PyPI side):
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a "trusted publisher" with:
#        Owner: jamjet-labs
#        Repository: engram
#        Workflow: release.yml
#        Environment: pypi
#   This grants short-lived OIDC tokens to this workflow — no PYPI_TOKEN
#   secret to manage or rotate.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="$(uv run python -c 'import tomllib; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "Tag and pyproject version both: $TAG_VERSION"

      - name: Build wheel + sdist
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-24.04
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/jamjet-engram
    permissions:
      # Required for OIDC trusted publishing — short-lived token, no secrets.
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `with: password:` — uses OIDC trusted publisher.

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for auto-generated notes

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          # Mark pre-releases (e.g. v1.0.0-rc1) automatically.
          prerelease: ${{ contains(github.ref_name, '-') }}

  docker:
    name: Build and push Docker image to GHCR
    runs-on: ubuntu-24.04
    needs: publish-pypi
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          # tag format: v0.2.0 or v0.2.0-rc1
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # latest tag only for non-prerelease versions
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (versioned + latest)
        if: steps.version.outputs.is_prerelease == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/jamjet-labs/engram-py-server:${{ steps.version.outputs.version }}
            ghcr.io/jamjet-labs/engram-py-server:latest
          platforms: linux/amd64,linux/arm64

      - name: Build and push (versioned only, prerelease)
        if: steps.version.outputs.is_prerelease == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/jamjet-labs/engram-py-server:${{ steps.version.outputs.version }}
          platforms: linux/amd64,linux/arm64
