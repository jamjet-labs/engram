name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync deps
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src/engram tests/

      - name: Format check
        run: uv run ruff format --check src/engram tests/

      - name: Type check (mypy --strict)
        run: uv run mypy src/engram

      - name: Test
        run: |
          uv run pytest \
            --cov=engram \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=79

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python }}
          path: coverage.xml
